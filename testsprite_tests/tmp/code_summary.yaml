version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 19
  - Vite
  - Framer Motion
  - React Router
  - Tailwind CSS
  - Better Auth (client)
routes:
  - path: /
    file: Frontend/src/pages/Home.tsx
    auth_required: false
    description: Landing page with features overview, FAQ, and CTA
  - path: /login
    file: Frontend/src/pages/Login.tsx
    auth_required: false
    description: User login page with email/password and Google OAuth
  - path: /signup
    file: Frontend/src/pages/Signup.tsx
    auth_required: false
    description: User registration page with email/password and Google OAuth
  - path: /verify-email
    file: Frontend/src/pages/VerifyEmail.tsx
    auth_required: false
    description: OTP email verification page after signup
  - path: /forgot-password
    file: Frontend/src/pages/ForgotPassword.tsx
    auth_required: false
    description: Password reset flow with OTP
  - path: /dashboard
    file: Frontend/src/pages/Dashboard.tsx
    auth_required: true
    description: Main dashboard showing all monitored endpoints with add/delete functionality
  - path: /logs
    file: Frontend/src/pages/Logs.tsx
    auth_required: true
    description: Activity logs with ping history, uptime bar, and share button
  - path: /settings
    file: Frontend/src/pages/Settings.tsx
    auth_required: true
    description: User settings page with email alerts toggle
  - path: /status/:shareToken
    file: Frontend/src/pages/StatusPage.tsx
    auth_required: false
    description: Public status page for a shared endpoint
features:
  - name: Landing Page
    description: Home page with hero section, feature highlights, FAQ accordion, and call-to-action
    files:
      - Frontend/src/pages/Home.tsx
    entry_route: /
    user_interactions:
      - View hero section with product description
      - Expand/collapse FAQ accordion items
      - Click CTA button to navigate to signup or dashboard
    api_calls: []
    auth_required: false
  - name: User Login
    description: Login with email/password or Google OAuth
    files:
      - Frontend/src/pages/Login.tsx
      - Frontend/src/lib/auth.ts
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Login button to submit
      - Click Google sign-in button for OAuth login
      - Click forgot password link
      - See error message on invalid credentials
    api_calls:
      - method: POST
        endpoint: /api/auth/sign-in/email
      - method: POST
        endpoint: /api/auth/sign-in/social (Google)
    auth_required: false
  - name: User Signup
    description: Register with email/password or Google OAuth
    files:
      - Frontend/src/pages/Signup.tsx
      - Frontend/src/lib/auth.ts
    entry_route: /signup
    user_interactions:
      - Fill name input field
      - Fill email input field
      - Fill password input field
      - Click Signup button to submit
      - Click Google sign-up button for OAuth
      - See validation errors
    api_calls:
      - method: POST
        endpoint: /api/auth/sign-up/email
    auth_required: false
  - name: Email Verification
    description: OTP-based email verification after signup
    files:
      - Frontend/src/pages/VerifyEmail.tsx
      - Frontend/src/lib/auth.ts
    entry_route: /verify-email
    user_interactions:
      - Enter OTP code received via email
      - Click verify button
      - Click resend code button
    api_calls:
      - method: POST
        endpoint: /api/auth/email-otp/verify-email
      - method: POST
        endpoint: /api/auth/email-otp/send-verification-otp
    auth_required: false
  - name: Forgot Password
    description: Password reset via email OTP
    files:
      - Frontend/src/pages/ForgotPassword.tsx
      - Frontend/src/lib/auth.ts
    entry_route: /forgot-password
    user_interactions:
      - Enter email address
      - Click send reset code button
      - Enter OTP code
      - Enter new password
      - Click reset password button
    api_calls:
      - method: POST
        endpoint: /api/auth/email-otp/request-password-reset
      - method: POST
        endpoint: /api/auth/email-otp/reset-password
    auth_required: false
  - name: Endpoint Dashboard
    description: Main dashboard to view, add, and delete monitored API endpoints
    files:
      - Frontend/src/pages/Dashboard.tsx
    entry_route: /dashboard
    user_interactions:
      - View list of all monitored endpoints with status indicators
      - Fill add endpoint form (name, URL, HTTP method, check interval)
      - Click add button to create new endpoint
      - Click delete button on an endpoint to remove it
      - See real-time status updates (auto-refresh every 15s)
    api_calls:
      - method: GET
        endpoint: /api/endpoints
      - method: POST
        endpoint: /api/endpoints
      - method: DELETE
        endpoint: /api/endpoints/{id}
    auth_required: true
  - name: Activity Logs
    description: View ping history, uptime charts, and share public status pages
    files:
      - Frontend/src/pages/Logs.tsx
      - Frontend/src/components/UptimeBar.tsx
    entry_route: /logs
    user_interactions:
      - Select an endpoint from dropdown
      - View endpoint health panel (uptime %, status, config)
      - View 30-day uptime bar chart
      - View recent ping history table (last 20 entries)
      - Click share button to copy public status page URL
    api_calls:
      - method: GET
        endpoint: /api/endpoints
      - method: GET
        endpoint: /api/endpoints/{id}
      - method: GET
        endpoint: /api/endpoints/{id}/pings
      - method: GET
        endpoint: /api/endpoints/{id}/share
    auth_required: true
  - name: User Settings
    description: View profile info and toggle email alert preferences
    files:
      - Frontend/src/pages/Settings.tsx
    entry_route: /settings
    user_interactions:
      - View profile name and email (read-only)
      - Toggle email alerts switch on/off
    api_calls:
      - method: GET
        endpoint: /api/settings
      - method: PUT
        endpoint: /api/settings
    auth_required: true
  - name: Public Status Page
    description: Publicly accessible status page for a shared endpoint
    files:
      - Frontend/src/pages/StatusPage.tsx
      - Frontend/src/components/UptimeBar.tsx
    entry_route: /status/:shareToken
    user_interactions:
      - View endpoint name, URL, and current status
      - View 30-day uptime bar chart
      - View recent ping history table
    api_calls:
      - method: GET
        endpoint: /api/public/status/{shareToken}
    auth_required: false
known_limitations: []
